<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SILICON PROSPECT oloid logo</title>
  <desc id="desc">A purple oloid-like orbital sphere mark for SILICON PROSPECT.</desc>
  <defs>
    <radialGradient id="core" cx="38%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#f0eaff"/>
      <stop offset="22%" stop-color="#c7bbff"/>
      <stop offset="58%" stop-color="#7d68d9"/>
      <stop offset="100%" stop-color="#241a58"/>
    </radialGradient>
    <linearGradient id="rim-a" x1="30" y1="46" x2="226" y2="210" gradientUnits="userSpaceOnUse">
